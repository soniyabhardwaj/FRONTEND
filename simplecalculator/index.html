<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2: Calculator</title>
    
    <!-- CSS for Styling the Calculator -->
    <style>
        /* Basic styling for the entire page */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        /* The main container for the calculator */
        .calculator {
            width: 320px;
            background: #22252D; /* Dark background for the calculator body */
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        /* The display screen */
        #display {
            width: 100%;
            height: 70px;
            border: none;
            background: #292D36; /* Darker background for the screen */
            border-radius: 10px;
            font-size: 2.5em; /* Large font size for the numbers */
            text-align: right;
            padding: 10px 20px;
            box-sizing: border-box;
            color: #fff;
            margin-bottom: 20px;
        }

        /* Prevent users from typing directly into the display */
        #display:focus {
            outline: none;
        }

        /* The container for all the buttons */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Creates a 4-column grid */
            gap: 15px; /* Space between buttons */
        }

        /* General styling for all buttons */
        button {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 1.5em;
            cursor: pointer;
            background: #272B33;
            color: #fff;
            transition: background 0.2s ease-in-out, transform 0.1s ease;
        }
        
        /* Give feedback when a button is hovered over */
        button:hover {
            background: #3a3f4c;
        }

        /* Give feedback when a button is clicked */
        button:active {
            transform: scale(0.95);
        }

        /* Special styling for operator buttons (+, -, *, /) */
        .operator {
            background: #FF9F0A; /* A bright color to stand out */
            color: #fff;
        }
        
        .operator:hover {
            background: #e68e00;
        }

        /* Special styling for the 'Clear' and 'Equals' buttons */
        #clear-btn {
            background: #AC3939; /* Red for clearing */
        }
        
        #clear-btn:hover {
            background: #9b3232;
        }

        #equal-btn {
            background: #4CAF50; /* Green for equals */
            grid-column: span 2; /* Make the equals button span two columns */
        }
        
        #equal-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

    <!-- HTML Structure of the Calculator -->
    <div class="calculator">
        <!-- The display screen where numbers and results are shown -->
        <input type="text" id="display" readonly>
        
        <!-- The grid of buttons for user input -->
        <div class="buttons">
            <!-- Row 1 -->
            <button id="clear-btn" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">*</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <!-- Row 2 -->
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <!-- Row 3 -->
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>

            <!-- Row 4 -->
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>

            <!-- Row 5: 0, decimal, and equals -->
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button id="equal-btn" onclick="calculateResult()">=</button>
        </div>
    </div>

    <!-- JavaScript for Calculator Logic -->
    <script>
        // Get the display element from the document
        const display = document.getElementById('display');

        // Function to append characters to the display
        function appendToDisplay(input) {
            display.value += input;
        }

        // Function to clear the display
        function clearDisplay() {
            display.value = "";
        }

        // Function to calculate the result
        function calculateResult() {
            try {
                // The eval() function evaluates a string as a JavaScript expression.
                // For example, eval("2+2") returns 4.
                // It's perfect for a simple calculator but can be a security risk in complex apps.
                display.value = eval(display.value);
            } catch (error) {
                // If the user enters an invalid expression (e.g., "5*/"), display "Error"
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
